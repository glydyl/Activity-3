<!DOCTYPE html>
<html>

<head>
<title>CSS External</title>
<link rel="stylesheet"href="style.css">
<style>

.button-container{
display: flex;
flex-direction: column;
align-items: flex-start;
gap: 10px;
}

.row-container{
display:flex;
flex-direction: row;
gap: 10px;
}

.reqnow{
background-color: rgb(0, 0, 0);
color: white;
border: none;
padding: 10px 16px;
border-radius: 2px;
cursor: pointer;
transition: opacity .15s;
}

.reqnow:hover{
opacity: 0.8;
}

.addtocart{
background-color: rgb(255, 216, 20);
color: black;
border: none;
padding: 7px 45px;
border-radius: 15px;
cursor: pointer;
transition: background-color .15s;
}
.addtocart:hover{
background-color: rgb(248, 189, 25);
color: black;
}

.signup{
background-color: rgb(46, 164, 79);
color: white;
font-weight: bold;
border: none;
padding: 9px 20px;
border-radius: 8px;
cursor: pointer;
}
.signup:hover{
box-shadow: 1px 5px 8px grey;
}

.getstart{
background-color: rgb(121, 82, 179);
color: white;
font-weight: bold;
border: none;
padding: 9px 20px;
border-radius: 3px;
cursor: pointer;
transition: background-color .15s;
}
.getstart:hover{
background-color: rgb(67, 39, 118);
color: white;
}

.dl{
background-color: rgb(0, 0, 0, 0);
color: rgb(108,117, 125);
font-weight: bold;
border: 1px solid rgb(108, 117, 125);
padding: 9px 20px;
margin-left: 10px;
border-radius: 3px;
cursor: pointer;
transition: background-color .15s;
}
.dl:hover{
background-color: rgb(108, 117, 125);
color: white;
}

.applyon{
background-color: rgb(10, 102, 194);
color: white;
font-weight: bold;
border: none;
padding: 9px 20px;
border-radius: 17px;
cursor: pointer;
}
.applyon:hover{
background-color: rgb(0, 65, 130);
}

.save{
background-color: rgb(0, 0, 0, 0);
color: rgb(10, 102, 194);
font-weight: bold;
border: 1px solid rgb(10, 102, 194);
padding: 9px 20px;
margin-left:10px;
border-radius: 20px;
cursor: pointer;
}
.save:hover{
background-color: rgba(0, 0, 0, 0.08);
outline: 1.5px solid rgb(10, 102, 194);
}

</style>
</head>
<body>

<div class="button-container">
<button class="reqnow">
 Request now
</button>
<button class="addtocart">
Add to Cart
</button>
<button class="signup">
Sign up
</button>

<div class="row-container">
<button class="getstart">
Get started </button>
<button class="dl">
Download</button>
</div>

<div class="row-container">
<button class="applyon">
Apply on company website 
</button>
<button class="save">
Save
</button>
</div>
</div>

</body>
</html>
